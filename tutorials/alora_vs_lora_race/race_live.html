<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Granite Switch — ALORA vs LoRA Live Race</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1e1e1e;
      color: #cccccc;
      font-family: 'IBM Plex Mono', 'Consolas', 'Cascadia Code', 'Monaco', monospace;
      font-size: 13px;
      line-height: 1.4;
      padding: 1rem 1.25rem 2rem;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #333;
    }

    .title { font-size: 1rem; font-weight: 600; color: #e0e0e0; }

    .badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 9px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-left: 0.6rem;
      background: #0d3558;
      color: #4fc3f7;
      border: 1px solid #4fc3f7;
      vertical-align: middle;
    }
    .badge.sim {
      background: #332800;
      color: #dcdcaa;
      border-color: #dcdcaa;
    }

    .elapsed {
      font-size: 1.05rem;
      color: #dcdcaa;
      min-width: 9rem;
      text-align: right;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    button {
      background: #2a2a2a;
      color: #cccccc;
      border: 1px solid #4a4a4a;
      padding: 0.22rem 0.65rem;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.82rem;
      border-radius: 2px;
      transition: background 0.1s;
    }
    button:hover  { background: #353535; border-color: #777; }
    button.active { background: #0d3558; color: #4fc3f7; border-color: #4fc3f7; }

    #playBtn { min-width: 5rem; }

    .speed-group { display: flex; gap: 2px; }
    .speed-group button { padding: 0.22rem 0.45rem; }

    .scrubber-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 3px;
      background: #3a3a3a;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #4fc3f7;
      cursor: pointer;
    }

    .scrubber-time {
      font-size: 0.72rem;
      color: #666;
      white-space: nowrap;
      min-width: 9rem;
      text-align: right;
    }

    /* ── Race grid ── */
    .race-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: #333;
      border: 1px solid #333;
    }

    .server-col { background: #1e1e1e; }

    .server-header {
      background: #252525;
      color: #9cdcfe;
      padding: 0.28rem 0.6rem;
      font-weight: 600;
      font-size: 0.82rem;
      border-bottom: 1px solid #333;
    }

    .conv-rows { padding: 0.2rem 0.5rem 0.2rem; }

    .conv-row {
      white-space: pre;
      line-height: 1.32;
      font-size: 12.5px;
    }

    .server-footer {
      background: #212121;
      padding: 0.28rem 0.6rem;
      font-size: 0.78rem;
      border-top: 1px solid #2d2d2d;
      min-height: 1.4rem;
    }

    /* ── Metrics / GPU panels ── */
    .metrics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: #333;
      border: 1px solid #333;
      border-top: none;
    }
    .metrics-rows { padding: 0.3rem 0.5rem 0.25rem; }
    .m-row { white-space: pre; line-height: 1.38; font-size: 12.5px; }
    .m-label { color: #555; display: inline-block; width: 8.5rem; }

    .gpu-header {
      background: #252525;
      color: #666;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      border: 1px solid #333;
      border-top: none;
    }
    .gpu-row {
      background: #1e1e1e;
      border: 1px solid #333;
      border-top: none;
      padding: 0.28rem 0.6rem;
      font-size: 12.5px;
      white-space: pre;
    }

    /* ── Error ── */
    #error { color: #f44747; margin: 1rem 0; font-size: 0.85rem; }
  </style>
</head>

  <div class="elapsed" id="elapsed">0:00.0</div>

<div class="controls">

</div>

// ── Constants ────────────────────────────────────────────────────────────────
const BAR_WIDTH = 20;

const STEP_COLORS = {
  'harm':     '#4fc3f7',
  'rewrite':  '#80deea',
  'retrieve': '#fff176',
  'answer?':  '#e040fb',
  'clarify':  '#e040fb',
  'generate': '#ef5350',
  'done':     '#66bb6a',
};
const DIM    = '#3a3a3a';
const NUMCOL = '#666666';

// ── Playback state ───────────────────────────────────────────────────────────
let eventData    = null;
let state        = [];        // state[srvIdx][convIdx]
let playbackTime = 0;
let nextEventIdx = 0;
let playing      = false;
let speed        = 5;
let lastRealTime = null;
let raceDuration = 0;
let numRuns      = 32;
let metricsState = null;  // most recent metrics event

// ── DOM refs ─────────────────────────────────────────────────────────────────
const playBtn      = document.getElementById('playBtn');
const scrubber     = document.getElementById('scrubber');
const scrubberTime = document.getElementById('scrubberTime');
const elapsedEl    = document.getElementById('elapsed');
const modeBadge    = document.getElementById('modeBadge');
const errorEl      = document.getElementById('error');

// ── Data loading ─────────────────────────────────────────────────────────────
async function loadData() {
  if (RACE_EVENTS_EMBEDDED) return RACE_EVENTS_EMBEDDED;

  // Real telemetry file
  try {
    const r = await fetch('race_events.json');
    if (r.ok) return await r.json();
  } catch (_) {}

  // Synthesize from aggregate results
  try {
    const r = await fetch('race_results.json');
    if (r.ok) return synthesizeEvents(await r.json());
  } catch (_) {}

  throw new Error('No data found — run bench_pipeline_race.py first, or serve this directory over HTTP.');
}

// ── Synthesis from race_results.json ─────────────────────────────────────────
function computeStartTimes(convWalls, concurrency) {
  const n = convWalls.length;
  const starts = new Array(n).fill(0);
  if (n <= concurrency) return starts;  // all start at 0

  // Greedy slot scheduling: track finish times as a sorted array.
  const slots = convWalls.slice(0, concurrency)
                          .map((w) => w)
                          .sort((a, b) => a - b);

  for (let i = concurrency; i < n; i++) {
    const earliest = slots.shift();
    starts[i] = earliest;
    const fin = earliest + convWalls[i];
    // Insert fin into sorted slots
    let lo = 0, hi = slots.length;
    while (lo < hi) { const mid = (lo + hi) >> 1; if (slots[mid] < fin) lo = mid + 1; else hi = mid; }
    slots.splice(lo, 0, fin);
  }
  return starts;
}

function synthesizeEvents(raceData) {
  const STEPS_FOR_EXIT = {
    harm_blocked:        ['harm'],
    unanswerable:        ['harm', 'rewrite', 'retrieve', 'answer?'],
    needs_clarification: ['harm', 'rewrite', 'retrieve', 'answer?', 'clarify'],
    full_pipeline:       ['harm', 'rewrite', 'retrieve', 'answer?', 'clarify', 'generate'],
  };
  const STEP_FRAC = {
    harm: 0.14, rewrite: 0.19, retrieve: 0.04,
    'answer?': 0.18, clarify: 0.20, generate: 0.36,
  };

  const serverNames = Object.keys(raceData.servers);
  const concurrency = raceData.metadata.concurrency;
  const TURNS       = 5;
  const events      = [];

  serverNames.forEach((srvName, srvIdx) => {
    const srv       = raceData.servers[srvName];
    const convWalls = srv.conv_walls;
    const work      = srv.work || [];
    const n         = convWalls.length;
    const starts    = computeStartTimes(convWalls, concurrency);

    for (let i = 0; i < n; i++) {
      const cs = starts[i];
      const cw = convWalls[i];
      events.push({t: r4(cs), ev: 'conv_start', srv: srvName, conv: i});

      let t = cs;
      for (let j = 0; j < TURNS; j++) {
        const wi    = work[TURNS * i + j] || {};
        const exit  = wi.exit || 'full_pipeline';
        const steps = STEPS_FOR_EXIT[exit] || STEPS_FOR_EXIT.full_pipeline;
        const td    = cw / TURNS;
        const tot   = steps.reduce((s, st) => s + (STEP_FRAC[st] || 0.1), 0);

        for (const step of steps) {
          events.push({t: r4(t), ev: 'step_start', srv: srvName, conv: i,
                       turn: `T${j + 1}`, step});
          t += td * (STEP_FRAC[step] || 0.1) / tot;
        }
        events.push({t: r4(t), ev: 'turn_done', srv: srvName, conv: i, turns_done: j + 1});
      }
      events.push({t: r4(cs + cw), ev: 'conv_done', srv: srvName, conv: i, wall_time: cw});
    }
  });

  events.sort((a, b) => a.t - b.t);
  return {
    servers:   serverNames,
    events,
    race_wall: raceData.metadata.race_wall,
    metadata:  raceData.metadata,
    simulated: true,
  };
}

function r4(v) { return Math.round(v * 10000) / 10000; }

// ── State management ─────────────────────────────────────────────────────────
function initState() {
  state = Array.from({length: eventData.servers.length}, () =>
    Array.from({length: numRuns}, () =>
      ({turns_done: 0, step: '', turn: '', done: false, wall_time: 0})
    )
  );
}

function resetPlayback() {
  playbackTime = 0;
  nextEventIdx = 0;
  metricsState = null;
  initState();
}

function applyEvent(evt) {
  const srvIdx = typeof evt.srv === 'number'
    ? evt.srv
    : eventData.servers.indexOf(evt.srv);
  if (srvIdx < 0 || srvIdx >= state.length) return;
  if (evt.conv < 0 || evt.conv >= state[srvIdx].length) return;
  const s = state[srvIdx][evt.conv];

  switch (evt.ev) {
    case 'conv_start':
      s.turns_done = 0; s.step = ''; s.turn = ''; s.done = false; s.wall_time = 0;
      break;
    case 'step_start':
      s.step = evt.step; s.turn = evt.turn || '';
      break;
    case 'turn_done':
      s.turns_done = evt.turns_done;
      break;
    case 'conv_done':
      s.done = true; s.wall_time = evt.wall_time; s.step = 'done';
      break;
    case 'metrics':
      metricsState = evt;
      return;   // no per-conv state to update
  }
}

function replayTo(targetTime) {
  resetPlayback();
  playbackTime = targetTime;
  while (nextEventIdx < eventData.events.length &&
         eventData.events[nextEventIdx].t <= targetTime) {
    applyEvent(eventData.events[nextEventIdx++]);
  }
}

// ── Rendering ────────────────────────────────────────────────────────────────
function fmtTime(secs) {
  const m = Math.floor(secs / 60);
  const s = (secs % 60).toFixed(1).padStart(4, '0');
  return `${m}:${s}`;
}

function updateRow(srvIdx, conv) {
  const el = document.getElementById(`row-${srvIdx}-${conv}`);
  if (!el) return;
  const s      = state[srvIdx][conv];
  const num    = String(conv + 1).padStart(2);
  const filled = Math.round(s.turns_done / 5 * BAR_WIDTH);
  const f      = '\u2588'.repeat(filled);
  const e      = '\u2591'.repeat(BAR_WIDTH - filled);

  if (s.done) {
    const c = STEP_COLORS.done;
    el.innerHTML =
      `<span style="color:${NUMCOL}">${num} </span>` +
      `<span style="color:${c}">${f}${e}  ${s.wall_time.toFixed(1)}s</span>`;
  } else if (s.step) {
    const c     = STEP_COLORS[s.step] || '#cccccc';
    const label = s.turn ? `${s.turn}:${s.step}` : s.step;
    el.innerHTML =
      `<span style="color:${NUMCOL}">${num} </span>` +
      `<span style="color:${c}">${f}</span>` +
      `<span style="color:${DIM}">${e}</span>` +
      `<span style="color:${c}">  ${label}</span>`;
  } else {
    el.innerHTML = `<span style="color:#3d3d3d">${num} ${f}${e}</span>`;
  }
}

function updateFooter(srvIdx) {
  const el        = document.getElementById(`footer-${srvIdx}`);
  if (!el) return;
  const srv       = state[srvIdx];
  const doneCount = srv.filter(s => s.done).length;

  if (doneCount === numRuns) {
    const wall = Math.max(...srv.map(s => s.wall_time));
    el.innerHTML =
      `<span style="color:#66bb6a;font-weight:600">DONE ${doneCount}/${numRuns}  \u2713 ${wall.toFixed(1)}s</span>`;
  } else {
    el.innerHTML =
      `<span style="color:#888">${doneCount}/${numRuns} done</span>`;
  }
}

// ── Metrics rendering ────────────────────────────────────────────────────────
const MBAR = 14;
const CONC_DEFAULT = 24;

function mBar(val, maxVal) {
  const frac   = maxVal > 0 ? Math.min(val / maxVal, 1.0) : 0;
  const filled = Math.round(frac * MBAR);
  return {
    f:    '\u2588'.repeat(filled),
    e:    '\u2591'.repeat(MBAR - filled),
    frac,
  };
}

function mColor(frac, invert = false) {
  // invert=false: green→yellow→red (bad = high, e.g. latency/waiting)
  // invert=true:  red→yellow→green (good = high, e.g. KV hit rate)
  if (invert) return frac < 0.4 ? '#ef5350' : frac < 0.7 ? '#ffa726' : '#66bb6a';
  return frac < 0.5 ? '#4fc3f7' : frac < 0.8 ? '#ffa726' : '#ef5350';
}

function mRow(label, val, maxVal, fmt, invert = false) {
  const {f, e, frac} = mBar(val, maxVal);
  const c = mColor(frac, invert);
  return `<div class="m-row">` +
    `<span class="m-label">${label}</span>` +
    `<span style="color:${c}">${f}</span>` +
    `<span style="color:#2e2e2e">${e}</span>` +
    `<span style="color:${c}">  ${fmt(val)}</span>` +
    `</div>`;
}

function updateMetrics() {
  const grid = document.getElementById('metricsGrid');
  if (!grid || !grid.children.length) return;

  if (!metricsState || !metricsState.vllm) {
    // Leave panels showing their initial "no data" message
    return;
  }

  const conc       = eventData.metadata?.concurrency || CONC_DEFAULT;
  const allVllm    = Object.values(metricsState.vllm).filter(Boolean);
  const ttftMax    = Math.max(Math.max(...allVllm.map(v => v.ttft_avg),   0) * 1.5, 0.5);
  const e2eMax     = Math.max(Math.max(...allVllm.map(v => v.e2e_avg),    0) * 1.5, 2.0);
  const promptMax  = Math.max(Math.max(...allVllm.map(v => v.prompt_avg), 0) * 1.5, 200);

  eventData.servers.forEach((srvName, srvIdx) => {
    const el = document.getElementById(`metrics-rows-${srvIdx}`);
    if (!el) return;
    const v = metricsState.vllm[srvName];
    if (!v) return;

    el.innerHTML =
      mRow('KV hit',    v.kv_hit,     100,       x => `${x.toFixed(0)}%`,        true)  +
      mRow('Running',   v.running,    conc,      x => `${x}/${conc}`,            false) +
      mRow('Waiting',   v.waiting,    conc,      x => `${x}`,                    false) +
      mRow('TTFT avg',  v.ttft_avg,   ttftMax,   x => `${x.toFixed(2)}s`,        false) +
      mRow('E2E avg',   v.e2e_avg,    e2eMax,    x => `${x.toFixed(1)}s`,        false) +
      mRow('Prompt',    v.prompt_avg, promptMax, x => `${Math.round(x)}\u00a0tok`, false);
  });

  // GPU
  const gpu = metricsState.gpu;
  if (gpu && gpu.length) {
    document.getElementById('gpuHeader').style.display = '';
    const gpuRow = document.getElementById('gpuRow');
    gpuRow.style.display = '';
    gpuRow.innerHTML = gpu.map(g => {
      const frac   = g.pct / 100;
      const filled = Math.round(frac * 10);
      const f      = '\u2588'.repeat(filled);
      const e      = '\u2591'.repeat(10 - filled);
      const c      = mColor(frac);
      return `<span style="color:#9cdcfe">${g.label}  ` +
             `</span><span style="color:${c}">${f}${e}  ${g.pct}%  ` +
             `${g.mem_used_gb.toFixed(1)}/${g.mem_total_gb.toFixed(0)}G</span>`;
    }).join('    ');
  }
}

function render() {
  elapsedEl.textContent = fmtTime(playbackTime);

  const frac = raceDuration > 0 ? playbackTime / raceDuration : 0;
  scrubber.value = Math.round(frac * 1000);
  scrubberTime.textContent = `${fmtTime(playbackTime)} / ${fmtTime(raceDuration)}`;

  for (let srv = 0; srv < eventData.servers.length; srv++) {
    for (let conv = 0; conv < numRuns; conv++) updateRow(srv, conv);
    updateFooter(srv);
  }
  updateMetrics();
}

// ── Playback engine ──────────────────────────────────────────────────────────
function tick(now) {
  if (playing) {
    const dt     = lastRealTime !== null ? (now - lastRealTime) / 1000 : 0;
    lastRealTime = now;
    playbackTime = Math.min(playbackTime + dt * speed, raceDuration);

    while (nextEventIdx < eventData.events.length &&
           eventData.events[nextEventIdx].t <= playbackTime) {
      applyEvent(eventData.events[nextEventIdx++]);
    }

    render();

    if (playbackTime >= raceDuration) {
      playing      = false;
      lastRealTime = null;
      playBtn.textContent = '\u21BA Replay';
    }
  }
  requestAnimationFrame(tick);
}

// ── Controls ─────────────────────────────────────────────────────────────────
playBtn.addEventListener('click', () => {
  if (playbackTime >= raceDuration) {
    resetPlayback();
    render();
  }
  playing = !playing;
  if (playing) {
    lastRealTime = null;
    playBtn.textContent = '\u23F8 Pause';
  } else {
    lastRealTime = null;
    playBtn.textContent = '\u25B6 Play';
  }
});

document.querySelectorAll('.speed').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.speed').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    speed = parseFloat(btn.dataset.speed);
  });
});

let scrubbing = false;
scrubber.addEventListener('mousedown', () => {
  scrubbing = true;
  playing = false;
  lastRealTime = null;
  playBtn.textContent = '\u25B6 Play';
});
scrubber.addEventListener('input', () => {
  if (!scrubbing || !eventData) return;
  replayTo((scrubber.value / 1000) * raceDuration);
  render();
});
scrubber.addEventListener('mouseup', () => { scrubbing = false; });

// ── Grid builder ─────────────────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('raceGrid');
  grid.innerHTML = '';

  eventData.servers.forEach((srvName, srvIdx) => {
    const col = document.createElement('div');
    col.className = 'server-col';

    const hdr = document.createElement('div');
    hdr.className = 'server-header';
    hdr.textContent = srvName;
    col.appendChild(hdr);

    const rows = document.createElement('div');
    rows.className = 'conv-rows';
    for (let i = 0; i < numRuns; i++) {
      const row = document.createElement('div');
      row.className = 'conv-row';
      row.id = `row-${srvIdx}-${i}`;
      row.innerHTML =
        `<span style="color:#3d3d3d">${String(i + 1).padStart(2)} ${'\u2591'.repeat(BAR_WIDTH)}</span>`;
      rows.appendChild(row);
    }
    col.appendChild(rows);

    const footer = document.createElement('div');
    footer.className = 'server-footer';
    footer.id = `footer-${srvIdx}`;
    footer.innerHTML = `<span style="color:#555">0/${numRuns} done</span>`;
    col.appendChild(footer);

    grid.appendChild(col);
  });

  // ── Metrics panel ──────────────────────────────────────────────────────────
  const mgrid = document.getElementById('metricsGrid');
  mgrid.innerHTML = '';

  const NO_DATA_MSG = '<div style="color:#3a3a3a;padding:0.3rem 0.5rem;font-size:12px">' +
                      'metrics available on next real run</div>';

  eventData.servers.forEach((srvName, srvIdx) => {
    const col = document.createElement('div');
    col.className = 'server-col';

    const hdr = document.createElement('div');
    hdr.className = 'server-header';
    hdr.style.color = '#666';
    hdr.textContent = `vLLM \u2014 ${srvName}`;
    col.appendChild(hdr);

    const rows = document.createElement('div');
    rows.className = 'metrics-rows';
    rows.id = `metrics-rows-${srvIdx}`;
    rows.innerHTML = NO_DATA_MSG;
    col.appendChild(rows);

    mgrid.appendChild(col);
  });
}

// ── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  try {
    eventData    = await loadData();
    numRuns      = eventData.metadata?.runs || 32;
    raceDuration = eventData.race_wall || eventData.metadata?.race_wall || 0;

    if (eventData.simulated) {
      modeBadge.textContent = 'SIMULATED';
      modeBadge.classList.add('sim');
    }

    buildGrid();
    resetPlayback();
    render();

    // Auto-play at the default speed (5×, already marked active)
    playing = true;
    lastRealTime = null;
    playBtn.textContent = '\u23F8 Pause';

    requestAnimationFrame(tick);
  } catch (err) {
    errorEl.textContent = 'Error: ' + err.message;
  }
}

init();
</script>
